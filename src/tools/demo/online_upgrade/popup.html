<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件更新状态</title>
    <style>
        body {
            width: 300px;
            padding: 10px;
            font-family: Arial, sans-serif;
        }
        .status {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
        }
        .up-to-date {
            background-color: #d4edda;
            color: #155724;
        }
        .update-available {
            background-color: #fff3cd;
            color: #856404;
        }
        button {
            padding: 6px 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .version-check-btn {
            margin: 10px 0;
            background-color: #28a745;
        }
        .version-info {
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="version-info" class="version-info">
        <p>当前版本: <span id="current-version"></span></p>
        <p>服务器版本: <span id="server-version"></span></p>
    </div>
    <div id="status" class="status up-to-date">
        当前版本是最新版本
    </div>
    <div id="update-section" style="display: none;">
        <button id="update-btn">立即更新</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
