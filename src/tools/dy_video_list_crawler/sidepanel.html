<!DOCTYPE html>
<html>
  <head>
    <title>Douyin Video List Crawler</title>
    <meta charset="UTF-8">
    <link href="../../libs/layui/css/layui.css" rel="stylesheet">
    <style>
      legend {
        font-size: 16px!important;
        font-weight: 400;
      }
      .data-type-desc {
        font-size: 12px;
        color: #999;
        margin-left: 10px;
      }
    </style>
  </head>
  <body>
    <div style="padding: 10px;">
      <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" id="btn-back">
          <i class="layui-icon layui-icon-left"></i>返回
      </button>
    </div>
    <fieldset class="layui-elem-field">
        <legend>抖音关键词视频采集</legend>
        <div class="layui-tab">
            <ul class="layui-tab-title">
              <li class="layui-this">Keyword</li>
            </ul>
            <div class="layui-tab-content">
              <div class="layui-tab-item layui-show">
                <form class="layui-form" action="" id="keyword-form" lay-filter="keyword-form">
                    <div class="layui-form-item">
                      <label class="layui-form-label">搜索关键字</label>
                      <div class="layui-input-inline">
                          <div class="layui-input-wrap" style="position: relative;">
                              <input type="text" id="search-input" name="keyword" class="layui-input" lay-verify="required" placeholder="搜索..." 
                                     style="padding-right: 38px; position: relative; z-index: 0;">
                              <span class="layui-input-suffix" 
                                    style="cursor: pointer; position: absolute; right: 0px; top: 50%; 
                                           transform: translateY(-50%); z-index: 1; pointer-events: auto;border-left: 1px solid #e6e6e6;" 
                                    id="douyin-keyword-search">
                                <i class="layui-icon layui-icon-search" style="font-size: 16px;"></i>
                              </span>
                          </div>
                      </div>
                  </div>
                  <div class="layui-form-item">
                    <label class="layui-form-label">视频类型</label>
                    <div class="layui-input-inline">
                      <select name="video-type" lay-filter="video-type">
                          <option value="" selected>全部</option>
                          <option value="video">视频</option>
                          <option value="image">图文</option>
                      </select>
                    </div>
                  </div>
                  <div class="layui-form-item">
                      <label class="layui-form-label">搜索规则</label>
                      <div class="layui-input-inline">
                        <select name="video-sort" lay-filter="video-sort">
                            <option value="综合" selected>综合</option>
                            <option value="最多点赞">最多点赞</option>
                            <option value="最新发布">最新发布</option>
                        </select>
                      </div>
                    </div>
                  <div class="layui-form-item">              
                      <label class="layui-form-label">视频总数</label>
                      <div class="layui-input-inline">
                        <input type="number" name="video-cnt" placeholder="20"  autocomplete="off" class="layui-input" min="1" step="10" value="20">
                      </div>              
                  </div>

                  <div class="layui-form-item">
                    <label class="layui-form-label">数据类型</label>
                    <div class="layui-input-block">
                      <input type="checkbox" name="data-video-list" title="视频列表（标题、链接）" lay-skin="primary" checked>
                      <input type="checkbox" name="data-video-data" title="视频数据（点赞、评论、分享、收藏）" lay-skin="primary" checked>
                      <input type="checkbox" name="data-author-data" title="达人数据（昵称、头像、粉丝、获赞）" lay-skin="primary" checked>
                    </div>
                  </div>

                  <div class="layui-form-item">
                    <div class="layui-input-block">
                      <button type="button" class="layui-btn" id="btn-start-crawler">立即提交</button>
                      <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
        </div>

        <div class="layui-field-box" style="margin-top: 10px;">
            <div class="layui-btn-container">
                <fieldset class="layui-elem-field layui-field-title">
                    <legend>进度信息</legend>
                </fieldset>
                <div id="progress-info" style="padding: 10px; background: #f8f8f8; border-radius: 4px; min-height: 30px;">
                    等待开始...
                </div>
            </div>
        </div>
    </fieldset>

    <script src="../../libs/layui/layui.js"></script>
    <script src="../../libs/sheetjs/xlsx.full.min.js"></script>
    <script src="../../libs/filesaver/FileSaver.min.js"></script>
    <script src="../../libs/moment/moment.js"></script>
    <script src="sidepanel.js"></script>

  </body>
</html>
