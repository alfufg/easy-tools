<!DOCTYPE html>
<html>
  <head>
    <title>Douyin Sidepanel</title>
    <meta charset="UTF-8">
  <link href="../../libs/layui/css/layui.css" rel="stylesheet">
  <style>
    legend {
      font-size: 16px!important;
      font-weight: 400;
    }
  </style>
  </head>
  <body>
    <div style="padding: 10px;">
      <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" id="btn-back">
          <i class="layui-icon layui-icon-left"></i>返回
      </button>
    </div>
    <fieldset class="layui-elem-field">
        <legend>抖音评论采集</legend>
        <div class="layui-tab">
            <ul class="layui-tab-title">
              <li class="layui-this">Keyword</li>
              <li>Links</li>
              <li>User</li>
              <li><a href="../demo/handsontable/table_demo.html" target="_blank" class="layui-font-blue">Data</a></li>
            </ul>
            <div class="layui-tab-content">
              <div class="layui-tab-item layui-show">
                <form class="layui-form" action="" id="keyword-form">
                    <div class="layui-form-item">
                      <label class="layui-form-label">搜索关键字</label>
                      <div class="layui-input-inline">
                          <div class="layui-input-wrap" style="position: relative;">
                              <input type="text" id="search-input" class="layui-input" layer-verify="required" placeholder="搜索..." 
                                     style="padding-right: 38px; position: relative; z-index: 0;">
                              <span class="layui-input-suffix" 
                                    style="cursor: pointer; position: absolute; right: 0px; top: 50%; 
                                           transform: translateY(-50%); z-index: 1; pointer-events: auto;border-left: 1px solid #e6e6e6;" 
                                    id="douyin-keyword-search">
                                <i class="layui-icon layui-icon-search" style="font-size: 16px;"></i>
                              </span>
                          </div>
                      </div>
                  </div>
                  <div class="layui-form-item">
                    <label class="layui-form-label">视频类型</label>
                    <div class="layui-input-inline">
                      <select name="douyin-video-type" lay-filter="guizi">
                          <option value="">请选择视频类型</option>
                          <option value="all" selected>全部</option>
                          <option value="video">视频</option>
                          <option value="image">图文</option>
                      </select>
                    </div>
                  </div>
                  <div class="layui-form-item">
                      <label class="layui-form-label">搜索规则</label>
                      <div class="layui-input-inline">
                        <select name="douyin-video-sort" lay-filter="guizi">
                            <option value="">请选择排序规则</option>
                            <option value="综合" selected>综合</option>
                            <option value="最多点赞">最多点赞</option>
                            <option value="最新发布">最新发布</option>
                        </select>
                      </div>
                    </div>

                  <div class="layui-form-item">              
                    <label class="layui-form-label">子评论采集</label>
                    <div class="layui-input-inline">
                      <input type="checkbox" name="show-more" title="ON|OFF" lay-skin="switch" id="keyword-show-more" checked> 
                    </div>              
                  </div>
                  <div class="layui-form-item">              
                      <label class="layui-form-label">视频总数</label>
                      <div class="layui-input-inline">
                        <input type="number" name="video_cnt" placeholder="20"  autocomplete="off" class="layui-input" min="0" step="20" lay-affix="number">
                      </div>              
                  </div>
                  <div class="layui-form-item">
                        <label class="layui-form-label">评论总数</label>
                        <div class="layui-input-inline">
                          <input type="number" name="comment_cnt" placeholder="500" autocomplete="off" class="layui-input" min="0" step="20" lay-affix="number">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">单视频评论数</label>
                        <div class="layui-input-inline">
                          <input type="number" name="video_comment_cnt" placeholder="100" autocomplete="off" class="layui-input" min="0" step="20" lay-affix="number">
                        </div>
                    </div>         
                  <div class="layui-form-item">
                    <div class="layui-input-block">
                      <button type="button" class="layui-btn" lay-submit lay-filter="demo1" id="douyin-keyword-start-crawler">立即提交</button>
                      <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                  </div>
                </form>
              </div>
              <div class="layui-tab-item">
                <form class="layui-form" action="">       
                    <div class="layui-form-item layui-form-text">
                      <label class="layui-form-label">视频链接</label>
                      <div class="layui-input-block">
                        <textarea name="video_links" placeholder="请输入链接， 每行一个" class="layui-textarea" rows="10" id="video-links"></textarea>
                      </div>
                    </div>
                    <div class="layui-form-item">              
                      <label class="layui-form-label">子评论采集</label>
                      <div class="layui-input-inline">
                        <input type="checkbox" name="show-more" title="ON|OFF" lay-skin="switch" id="video-links-show-more" checked> 
                      </div>              
                    </div>
                    <div class="layui-form-item">
                      <label class="layui-form-label">评论总数</label>
                      <div class="layui-input-inline">
                        <input type="number" name="comment_cnt" id="video-links-comment-cnt" placeholder="500" autocomplete="off" class="layui-input" min="0" step="20" lay-affix="number">
                      </div>
                  </div>
                  <div class="layui-form-item">
                      <label class="layui-form-label">单视频评论数</label>
                      <div class="layui-input-inline">
                        <input type="number" name="video_comment_cnt" id="video-links-video-comment-cnt" placeholder="100" autocomplete="off" class="layui-input" min="0" step="20" lay-affix="number">
                      </div>
                  </div>  
                    <div class="layui-form-item">
                      <div class="layui-input-block">
                        <button type="button" class="layui-btn" lay-submit lay-filter="demo1" id="douyin-links-start-crawler">立即提交</button>
                        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                      </div>
                    </div>
                  </form>
              </div>
              <div class="layui-tab-item">
                <form class="layui-form" action="">
                    <div class="layui-form-item">
                      <label class="layui-form-label">用户ID</label>
                      <div class="layui-input-inline">
                          <div class="layui-input-wrap" style="position: relative;">
                              <input type="text" id="user-id-input" class="layui-input" placeholder="" 
                                     style="padding-right: 38px; position: relative; z-index: 0;">
                              <span class="layui-input-suffix" 
                                    style="cursor: pointer; position: absolute; right: 0px; top: 50%; 
                                           transform: translateY(-50%); z-index: 1; pointer-events: auto;border-left: 1px solid #e6e6e6;" 
                                    id="douyin-user-search">
                                <i class="layui-icon layui-icon-search" style="font-size: 16px;"></i>
                              </span>
                          </div>
                      </div>
                  </div>
                  <div class="layui-form-item">              
                      <label class="layui-form-label">视频总数</label>
                      <div class="layui-input-inline">
                        <input type="number" name="video_cnt" placeholder="20"  autocomplete="off" class="layui-input" min="0" step="20" lay-affix="number">
                      </div>              
                  </div>
                  <div class="layui-form-item">              
                    <label class="layui-form-label">子评论采集</label>
                    <div class="layui-input-inline">
                      <input type="checkbox" name="show-more" title="ON|OFF" lay-skin="switch" id="user-show-more" checked> 
                    </div>              
                  </div>
                  <div class="layui-form-item">
                        <label class="layui-form-label">评论总数</label>
                        <div class="layui-input-inline">
                          <input type="number" name="comment_cnt" placeholder="500" autocomplete="off" class="layui-input" min="0" step="20" lay-affix="number">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">单视频评论数</label>
                        <div class="layui-input-inline">
                          <input type="number" name="video_comment_cnt" placeholder="60" autocomplete="off" class="layui-input" min="0" step="20" lay-affix="number">
                        </div>
                    </div>         
                  <div class="layui-form-item">
                    <div class="layui-input-block">
                      <button type="button" class="layui-btn" lay-submit lay-filter="demo1" id="douyin-user-start-crawler">立即提交</button>
                      <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
        </div>

        <div class="layui-field-box" style="display: none;">
            <div class="layui-btn-container">
                <fieldset class="layui-elem-field layui-field-title">
                    <legend>单功能测试</legend>
                </fieldset>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-radius" id="open-douyin-home">打开主页</button>
                <button type="button" class="layui-btn layui-btn-radius" id="douyin_video_crawler">爬取视频</button>
                <button type="button" class="layui-btn layui-btn-normal layui-btn-radius" id="douyin_comment_crawler">爬取评论</button>
                <button type="button" class="layui-btn layui-btn-warm layui-btn-radius" id="douyin_edit_sort">更改排序</button>
                <button type="button" class="layui-btn layui-btn-danger layui-btn-radius" id="douyin_edit_type">更改类型</button>
            </div>
        </div>
    </fieldset>

    <script src="../../libs/layui/layui.js"></script>
    <script src="../../libs/sheetjs/xlsx.full.min.js"></script>
    <script src="../../libs/filesaver/FileSaver.min.js"></script>
    <script src="../../libs/moment/moment.js"></script>
    <script src="sidepanel.js"></script>

  </body>
</html>
