<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo</title>
  <!-- 请勿在项目正式环境中引用该 layui.css 地址 -->
  <link href="../libs/layui/css/layui.css" rel="stylesheet">
</head>
<body>
<div class="layui-bg-gray" style="padding: 16px;">
  <div class="layui-row layui-col-space15">
    <a class="layui-col-md4" href="../tools/xhs_comment_crawler/sidepanel.html">
      <div class="layui-card">
        <div class="layui-card-header">小红书评论采集</div>
        <div class="layui-card-body">
            可通过指定关键字、链接、或达人ID进行相关评论采集<br>
        </div>
      </div>
    </a>
    <div class="layui-col-md4">
      <div class="layui-card">
        <div class="layui-card-header">抖音评论采集</div>
        <div class="layui-card-body">
          可通过指定关键字、链接、或达人ID进行相关评论采集<br>
        </div>
      </div>
    </div>
    <a class="layui-col-md4" href="../tools/dy_video_recorder/index.html">
        <div class="layui-card">
          <div class="layui-card-header">抖音视频录屏</div>
          <div class="layui-card-body">
            指定抖音视频链接进行自动录屏<br>
            结案材料
          </div>
        </div>
      </a>
      <a class="layui-col-md4" href="../tools/dy_video_download/index.html">
        <div class="layui-card">
          <div class="layui-card-header">抖音视频下载</div>
          <div class="layui-card-body">
            抖音无水印视频下载助手<br>
          </div>
        </div>
      </a>
      <a class="layui-col-md4" href="../tools/dy_video_crawler/index.html">
        <div class="layui-card">
          <div class="layui-card-header">星图视频数据采集</div>
          <div class="layui-card-body">
            可通过星图达人详情链接、星图ID进行视频数据采集<br>
          </div>
        </div>
      </a>
      <a class="layui-col-md4" href="../tools/seo_sort/index.html">
        <div class="layui-card">
          <div class="layui-card-header">网站收录排位查询</div>
          <div class="layui-card-body">
            通过关键词、网址查询各搜索平台的收录排位<br>
          </div>
        </div>
      </a>
  </div>
</div>

<script src="../libs/layui/layui.js"></script>

</body>
</html>
